# comment
server {
	listen 8080;
	listen 8081;

	client_max_header_size 8K;
	client_max_body_size 1M;

	header_timeout 30;
	body_timeout 180;

	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	cgi_extension .go;

	# location /
	root /var/www;
	index index2.html;

	location /redirect {
		redirect 301 http://localhost:8081/;
	}

	# /var/www/images
	location /images {
		methods GET POST;
		upload_store /var/www/images;
		autoindex on;
	}

	# /tmp/nginx/files
	# default file to serve when the requested resource is a directory
	location /files {
		root /tmp/nginx;
		autoindex on;

		# location /files prefixi icermeli:
		# location "/a" is outside location "/files"
		# /tmp/nginx/files/a
		location /files/a {
			index index.html;
		}
	}
}

server {
	listen localhost:9090;

	client_max_body_size 1M;

	location / {
		root /var/www/other;
		index index.html;
	}
}

