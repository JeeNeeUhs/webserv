# comment line
server {
    listen 80;
    listen 192.168.1.1:8081;

    client_max_header_size 10;
    client_max_body_size 10;
    client_header_timeout 4;
    client_body_timeout 3;

    error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	cgi_extension .go;
    cgi_extension .py;

    root /var/www;
    # index index.html;

    location / {
        root /var/www/html;
        index index.html;
    }

    # localhost:8080/images
    # /var/www/images
    location /images {
        methods GET POST DELETE;
        methods DELETE;
        autoindex on;
        upload_store /var/www/images;

        # /var/www/images/cat
        location /images/cat {
            index cat.html;
        }
    }


}