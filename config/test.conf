server {
	listen 8080;
	root /Users/nothing/cowd/42webserv/www;
	index index.html;
	autoindex on;
	methods GET POST;

	location /upload {
		methods POST;
		upload_store /Users/nothing/cowd/42webserv/www/uploads;
	}

	location /cgi-bin {
		index echo.sh;
		methods GET POST;
		cgi_extension .sh;
	}

	location /old {
		redirect /new;
	}
}