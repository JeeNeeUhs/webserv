# comment line
server {
    listen 80;
    listen 192.168.1.1:8081;

    root /var/www/html;
    index index.html;

    client_max_header_size 8192;
    client_max_body_size 1048576;
    client_header_timeout 10;
    client_body_timeout 30;

    methods GET POST;

    cgi_extension .php;
    cgi_extension .py;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        autoindex off;
    }

    location /upload {
        methods POST;
        upload_store /tmp/uploads;
    }

    location /api {
        methods GET POST DELETE;

        error_page 403 /errors/api_403.html;

        location /api/v1 {
            root /srv/api/v1;
        }

        location /api/v2 {
            methods GET;
        }
    }

    location /redirect {
        redirect 301 /new-path;
    }

    location /cgi {
        cgi_extension .rb;
    }
}
