server {
	listen 8080;
	listen 127.0.0.1:65535;

	root /var/www/html;
	index index.html;
	autoindex off;

	client_max_body_size 1048576;

	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	methods GET POST;

	location / {
		methods GET;
		autoindex on;
	}

	location /upload {
		methods GET POST DELETE;
		upload_store /var/www/uploads;
	}

	location /cgi-bin {
		root /var/www/cgi;
		cgi_extension .py;
		methods GET POST;
	}

	location /old {
		redirect 301 /new;
	}
}

server {
	listen 8081;
	root /var/www/site2;
	index home.html;

	error_page 500 /errors/500.html;

	location / {
		methods GET;
	}

	location /api {
		methods GET POST DELETE;

		error_page 403 /errors/api403.html;
		error_page 404 /errors/api404.html;

		location /api/v1 {
			index apiv1.html;
		}

		location /api/v2 {
			index apiv2.html;
		}
	}
}
