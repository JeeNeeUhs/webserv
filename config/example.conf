server {
	listen 8080;
	listen 127.0.0.1:65535;

	root /Users/emirhan/Desktop/www;

	client_max_body_size 1048576;

	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	location / {
		autoindex on;
		error_page 403 /errors/403.html;
	}

	location /static {
		autoindex on;
		error_page 403 /errors/403.html;
	}

	location /uploads {
		methods GET POST DELETE;
		autoindex on;
		upload_store /Users/emirhan/Desktop/www/uploads;
	}

	location /cgi-bin {
		methods GET POST;
		cgi_extension .py;
		cgi_extension .sh;
	}

	location /redirect {
		redirect 301 /;
	}
}

server {
	listen 127.0.0.1:8081;

	
}
