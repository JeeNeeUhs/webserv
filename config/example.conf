server {
	listen 8080;

	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	client_max_body_size 1M;

	location / {
		root /var/www/html;
		index index.html;
		methods GET;
		autoindex off;
	}

	location /upload {
		root /var/www/upload;
		methods GET POST DELETE;
		upload_store /var/www/uploads;
	}

	location /redirect {
		redirect 301 http://localhost:8080/;
	}

	location /listing {
		root /var/www/files;
		methods GET;
		autoindex on;
	}

	location /cgi-bin {
		root /var/www/cgi;
		methods GET POST;
		cgi_extension .py;
	}

	location /go-cgi {
		root /var/www/cgi-go;
		methods GET POST;
		cgi_extension .go;
	}
}

server {
	listen 9090;

	error_page 404 /errors/404.html;

	client_max_body_size 2M;

	location / {
		root /var/www/other;
		index index.html;
		methods GET POST;
		autoindex off;
	}
}