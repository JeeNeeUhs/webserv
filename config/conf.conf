server {
	listen 8080;
	root /Users/emirhan/Projects/webserv/www;
	index index.html;
	autoindex on;
	methods GET POST;

	location /uploads {
		methods POST GET DELETE;
		upload_store /Users/emirhan/Projects/webserv/www/uploads;
	}

	location /cgi-bin {
		index echo.sh;
		methods GET POST;
		cgi_extension .sh;
	}
