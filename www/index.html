<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>webserv</title>
	<style>
		ul {
			margin: 0;
		}

		@keyframes wobble {
			0%   { transform: scale(1) rotate(-5deg); }
			25%  { transform: scale(1.15) rotate(5deg); }
			50%  { transform: scale(1) rotate(-5deg); }
			75%  { transform: scale(1.15) rotate(5deg); }
			100% { transform: scale(1) rotate(-5deg); }
		}

		.animText {
			margin-left: 5px;
			margin-right: 5px;
			display: inline-block;
			transform-origin: center center;
			animation: wobble 1s infinite ease-in-out;
			color: yellow;
			text-shadow: 
				-1px -1px 0 #000,  
				1px -1px 0 #000,
				-1px  1px 0 #000,
				1px  1px 0 #000;
			font-size: 13px;
			position: absolute;
			top: 25px;
			right: 0px;
		}

		.ahekinci {
			background-color: #0d1116;
			color: #ff7b72;
			font-family: monospace;
			padding: 2px;
		}

		.ebabaogl {
			background-color: #282828;
			color: #b8b734;
			font-family: monospace;
			padding: 2px;
		}
	</style>
</head>
<body>
	<div>
		<div style="position: relative; width: fit-content; padding-right: 20px; font-size: 18px;">

			<div class="animText"></div>
		</div>

</body>
